# Orders Service Configuration

[server]
# Server port
port = 3003

[database]
# PostgreSQL connection URL (port 5433 because of Docker mapping)
url = "postgres://opentel_user:opentel_pass@localhost:5433/opentel_db"
# Maximum number of connections in the pool
max_connections = 5

[services]
# Products Service
products_host = "localhost"
products_port = 3001

# Inventory Service
inventory_host = "localhost"
inventory_port = 3002

# Fraud Scoring Service
fraud_scoring_host = "localhost"
fraud_scoring_port = 3004

[http_client]
# Request timeout in seconds
timeout_secs = 30
