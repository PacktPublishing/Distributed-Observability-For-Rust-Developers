# Orders Service Configuration for Docker

[server]
# Server port
port = 3003

[database]
# PostgreSQL connection URL (using postgres service name in docker-compose)
url = "postgres://opentel_user:opentel_pass@postgres:5432/opentel_db"
# Maximum number of connections in the pool
max_connections = 5

[services]
# Products Service (using service name in docker-compose)
products_host = "products"
products_port = 3001

# Inventory Service (using service name in docker-compose)
inventory_host = "inventory"
inventory_port = 3002

[http_client]
# Request timeout in seconds
timeout_secs = 30

[async_runtime]
# Maximum number of concurrent admitted checkout handlers
max_inflight_checkouts = 64
# Slow async phase warning threshold in milliseconds
starvation_warn_ms = 40
