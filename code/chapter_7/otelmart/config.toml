# OtelMart Service Configuration

# Server configuration
[server]
# Server port
port = 4200
# Static files directory (Angular build output)
static_dir = "./dist/otelmart-app/browser"

[database]
# PostgreSQL connection URL
url = "postgres://ecommerce_user:ecommerce_password@localhost:5432/ecommerce"
# Maximum number of connections in the pool
max_connections = 5

[services]
# Products Service
products_host = "localhost"
products_port = 3001

# Inventory Service
inventory_host = "localhost"
inventory_port = 3002

# Orders Service
orders_host = "localhost"
orders_port = 3003

# Legacy URLs (for backward compatibility)
inventory_service_url = "http://localhost:3002"
orders_service_url = "http://localhost:3003"

[http_client]
# Request timeout in seconds
timeout_secs = 30

[session]
# Session expiration in days
expiration_days = 7
